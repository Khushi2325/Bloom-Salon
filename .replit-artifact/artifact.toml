kind = "web"
previewPath = "/"
title = "Bloom Salon"
version = "1.0.0"
id = "artifacts/bloom-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23590

[services.development]
run = "pnpm --filter @workspace/bloom-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloom-salon", "run", "build" ]
publicDir = "artifacts/bloom-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23590"
BASE_PATH = "/"
